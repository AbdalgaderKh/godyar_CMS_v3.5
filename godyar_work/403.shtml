<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 - Forbidden</title>
  <style>
    body{font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#111827;margin:0;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
    .box{max-width:520px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:24px;box-shadow:0 12px 28px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;font-size:22px}
    p{margin:0 0 14px;line-height:1.8}
    a{color:#111;text-decoration:none;border-bottom:1px solid rgba(0,0,0,.25)}
  </style>
</head>
<body>
  <div class="box">
    <h1>403 — لا تملك صلاحية الوصول</h1>
    <p>إذا كنت تظن أن هذا خطأ، تأكد من صلاحيات الملفات أو تواصل مع مدير الموقع.</p>
    <p><a href="/">العودة للرئيسية</a></p>
  </div>
</body>
</html>
